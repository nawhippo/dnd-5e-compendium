name: Release Module

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create module package
        run: |
          mkdir -p release
          cp module.json release/
          cp README.md release/
          cp INSTALL.md release/
          cp -r packs release/
          
      - name: Create zip
        run: |
          cd release
          zip -r ../dnd-5e-phb-compendium.zip .
          cd ..
          
      - name: Update Release with Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dnd-5e-phb-compendium.zip
            module.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
